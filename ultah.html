<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Selamat Ulang Tahun</title>
    <style>
        body {
            background: linear-gradient(to bottom, #fdfbfb, #ebedee);
            font-family: "Segoe UI", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            width: 380px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .decor {
            font-size: 24px;
            margin: 10px 0;
        }

        p {
            font-size: 14px;
            color: #444;
            line-height: 1.6;
        }

        input {
            margin-top: 15px;
            padding: 8px;
            width: 80%;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            border: none;
            border-radius: 10px;
            background-color: #f4b6c2;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e89aaa;
        }

        .message {
            margin-top: 20px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="decor">🌸 🎈 🎂 🎈 🌸</div>
    <h1>Selamat Ulang Tahun</h1>

    <input type="text" id="nama" placeholder="Masukkan nama">

    <br>
    <button onclick="tampilkanUcapan()">Tampilkan Ucapan</button>

    <div class="message" id="hasil"></div>

    <div class="footer">Semoga harimu penuh ketenangan ✨</div>
</div>

<script>
    function tampilkanUcapan() {
        let nama = document.getElementById("nama").value;

        if (nama === "") {
            alert("Masukkan nama terlebih dahulu.");
            return;
        }

        document.getElementById("hasil").innerHTML = `
            <p><strong>Hai ${nama},</strong></p>
            <p>
                Di hari ini, aku cuma ingin mengucapkan hal yang baik.
                Semoga kamu selalu sehat, dikelilingi orang-orang yang tulus,
                dan diberi kekuatan untuk menjalani hidup dengan versi terbaik
                dari dirimu.
            </p>
            <p>
                Terima kasih untuk bagian cerita yang pernah kita lalui.
                Tanpa penyesalan, hanya pembelajaran.
                Semoga hidup memperlakukanmu dengan baik.
            </p>
            <div class="decor">🎈 🌷 🎂 🌷 🎈</div>
        `;
    }
</script>

</body>
</html>
